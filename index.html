<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>

<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <form action="" method="get">
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label for="name">Nome:</label>
                <input id="name" type="text" name="userName" required>
                <br>
                <label for="age">Idade:</label>
                <input id="age" type="number" name="age" min="12" max="100" required>
                <br>

                <label for="birthDate">Data de Nascimento:</label>
                <input id="birthDate" type="date" name="birthDate">
                <br>

                <label for="email">E-mail:</label>
                <input id="email" type="email" name="email" required>
                <br>

                <label for="userPhoneNumber">Telefone:</label>
                <input id="userPhoneNumber" type="tel" name="userPhoneNumber" pattern="[0-9]{11}"
                    placeholder="11999999999" required>
                <br>

                <label for="userImage">Upload de Foto:</label>
                <input id="userImage" type="file" accept="image/*" name="userImage">
                <br>
            </fieldset>

            <fieldset>
                <legend>Perfil</legend>

                <p>Gênero:</p>
                <input id="masc" type="radio" name="userGender" value="Masculino">
                <label for="masc">Masculino</label>
                <br>

                <input id="feminino" type="radio" name="userGender" value="Feminino">
                <label for="feminino">Feminino</label>
                <br>

                <input id="notInformed" type="radio" name="userGender" value="notInformed">
                <label for="notInformed">Prefiro não informar</label>
                <br>

                <label for="maritalStatus">Estado Civil:</label>
                <select id="maritalStatus" name="maritalStatus">
                    <option value="notInformed">Selecione...</option>
                    <option value="married">Casado</option>
                    <option value="single">Solteiro</option>
                    <option value="divorced">Divorciado</option>
                    <option value="widowed">Viúvo</option>
                    <option value="stable union">União Estável</option>
                </select>

                <label for="State">Estado:</label>
                <select id="State" name="userState" required>
                    <option value="AC">AC</option>
                    <option value="AL">AL</option>
                    <option value="AP">AP</option>
                    <option value="AM">AM</option>
                    <option value="BA">BA</option>
                    <option value="CE">CE</option>
                    <option value="DF">DF</option>
                    <option value="ES">ES</option>
                    <option value="GO">GO</option>
                    <option value="MA">MA</option>
                    <option value="MT">MT</option>
                    <option value="MS">MS</option>
                    <option value="MG">MG</option>
                    <option value="PA">PA</option>
                    <option value="PB">PB</option>
                    <option value="PR">PR</option>
                    <option value="PE">PE</option>
                    <option value="PI">PI</option>
                    <option value="RJ">RJ</option>
                    <option value="RN">RN</option>
                    <option value="RS">RS</option>
                    <option value="RO">RO</option>
                    <option value="RR">RR</option>
                    <option value="SC">SC</option>
                    <option value="SP">SP</option>
                    <option value="SE">SE</option>
                    <option value="TO">TO</option>
                </select>

                <label for="userCity">Cidade:</label>
                <input id="userCity" type="text" name="userCity">
            </fieldset>

            <fieldset>
                <legend>Habitos</legend>
                <p>Redes Sociais:</p>
                <input id="instagram" type="checkbox" name="social" value="instagram">
                <label for="instagram">Instagram</label>
                <br>
                <input id="facebook" type="checkbox" name="social" value="facebook">
                <label for="facebook">facebook</label>
                <br>
                <input id="linkedin" type="checkbox" name="social" value="linkedin">
                <label for="linkedin">LinkedIn</label>
                <br>
                <input id="x" type="checkbox" name="social" value="x">
                <label for="x">X (antigo Twitter)</label>
                <br>
                <Label for="musicstyle">Estilo Musical:</Label>
                <input list="styletypes" id="musicstyle" name="usermusicstyle" type="text">
                <datalist id="styletypes">
                    <option value="Pop">
                    <option value="Rock">
                    <option value="Hip Hop">
                    <option value="Eletrônica">
                    <option value="Sertanejo">
                    <option value="Funk">
                </datalist>
                <br>
                <label for="favoriteColor">Cor Favorita:</label>
                <input type="color" name="userfavorcolor" id="favoriteColor">
            </fieldset>

            <fieldset>
                <legend>Comentários</legend>
                <label for="Satisfaction">Qualidade do Serviço:</label>
                <br>
                <input id="excellent" type="radio" name="useropinion" value="excellent">
                <label for="excellent">Excelente</label>
                <br>
                <input id="good" type="radio" name="useropinion" value="good">
                <label for="good">Bom</label>
                <br>
                <input id="fair" type="radio" name="useropinion" value="fair">
                <label for="fair">Regular</label>
                <br>
                <input id="poor" type="radio" name="useropinion" value="poor">
                <label for="poor">Ruim</label>
                <br>
                <label for="comments">Comentários:</label>
                <textarea name="usercomments" id="comments"
                    placeholder="Escreva seu comentario sobre o serviço..."></textarea>
            </fieldset>

            <fieldset>
                <legend>Confirmações</legend>
                <input type="checkbox" name="userLgpd" id="userLgpdTerms" value="acepted" required>
                <label for="userLgpdTerms">Eu aceito participar da pesquisa/label>
                    <br>
                    <input type="checkbox" name="userGetResult" id="getResult" value="acepted">
                    <label for="getResult">Desejo receber os resultados por email</label>
            </fieldset>
            <button type="submit">Enviar</button>
        </form>



    </section>
</body>

</html>
